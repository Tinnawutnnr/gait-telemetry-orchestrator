services:
# ── 1. FastAPI Orchestrator ───────────────────────────────────────────────
  api:
    build: 
      context: .
    container_name: gait_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - gait_net
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  # ── Ingestion Bridge (MQTT to Kafka) ──────────────────────────────────────
  ingestion_bridge:
    build: 
      context: .
    container_name: gait_ingestion_bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - KAFKA_BROKER_URL=kafka:9092
      - KAFKA_TOPIC=raw-gait-telemetry
      
      - SKIP_MIGRATIONS=true

      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_USE_TLS=true
    command: ["python", "-m", "workers.ingestion_bridge"]
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/bridge_healthy -mmin -1 | grep -q . || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s # Allow extra startup time for MQTT connection
    networks:
      - gait_net
    depends_on:
      kafka:
        condition: service_healthy

  # ── Worker for Kafka Consumers ─────────────────────
  ml_worker:
    build:
      context: .
    container_name: gait_ml_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - KAFKA_BROKER_URL=${KAFKA_BROKER_URL}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - KAFKA_GROUP_ID=${KAFKA_GROUP_ID}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: ["python", "-m", "workers.ml_worker"]
    networks:
      - gait_net
    depends_on:
      kafka:
        condition: service_healthy
      db:
        condition: service_healthy

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gait_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gait_net

  # ── Kafka (KRaft mode) ───────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: gait-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093 

      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092

      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_CLUSTER_ID=6Lc9H2v9TeS0lFm7pQ7A6w
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - gait_net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  gait_net:
    driver: bridge

volumes:
  pgdata:
  kafka_data:
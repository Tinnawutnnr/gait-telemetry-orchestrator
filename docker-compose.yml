services:
# ── 1. FastAPI Orchestrator ───────────────────────────────────────────────
  api:
    build: 
      context: .
    container_name: gait_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - gait_net
    depends_on:
      db:
        condition: service_healthy

  # ── Ingestion Bridge (MQTT to Kafka) ──────────────────────────────────────
  ingestion_bridge:
    build: 
      context: .
    container_name: gait_ingestion_bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - KAFKA_BROKER_URL=kafka:9092 
      - KAFKA_TOPIC=raw-gait-telemetry
      
      - SKIP_MIGRATIONS=true

      - MQTT_BROKER=${MQTT_BROKER} 
      - MQTT_PORT=${MQTT_PORT}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_USE_TLS=true
    command: ["python", "-m", "workers.ingestion_bridge"]
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/bridge_healthy -mmin -1 | grep -q . || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s # Allow extra startup time for MQTT connection
    networks:
      - gait_net
    depends_on:
      kafka:
        condition: service_healthy

  # ── Worker for Kafka Consumers ─────────────────────


  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gait_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gait_net

  # ── Kafka (KRaft mode) ───────────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: gait-kafka
    ports:
      - "9092:9092"
    environment:
      # --- JVM Tuning ---
      - KAFKA_HEAP_OPTS=-Xmx512M -Xms512M
      
      # --- KRaft Settings ---
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_KRAFT_CLUSTER_ID=6Lc9H2v9TeS0lFm7pQ7A6w
      
      # --- Network Settings ---
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      
      # --- Performance & Persistence ---
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=4
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gait_net

  # ── Kafka UI ─────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gait-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-gait-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVER=kafka:9092
      - KAFKA_CLUSTERS_0_METRICS_PORT=9999
      - DYNAMIC_CONFIG_ENABLED='true'
    networks:
      - gait_net
    depends_on:
      kafka:
        condition: service_healthy

networks:
  gait_net:
    driver: bridge

volumes:
  pgdata:
  kafka_data:
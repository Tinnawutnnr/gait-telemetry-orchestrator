name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  DOCKER_IMAGE: gait-telemetry-orchestrator

# Prevent redundant pipeline runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Testing & Quality Gate ──────────────────────────────────────────
  ci:
    name: "CI · Lint & Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gait_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5433/gait_test
      TEST_DATABASE_URL: postgresql://test:test@localhost:5433/gait_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      HASH_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      MQTT_BROKER: "localhost"
      MQTT_BROKER_WSS: "localhost"
      MQTT_PUB_USERNAME: "test_user"
      MQTT_PUB_PASSWORD: "test_password"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # ── Lint (fail‑fast) ──────────────────────────────────────────────────
      - name: Ruff · lint
        run: ruff check . --output-format=github

      - name: Ruff · format check
        run: ruff format --check .

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Run Alembic migrations (test DB)
        run: alembic upgrade head
        env:
          ALEMBIC_TARGET_ENV: test
          MQTT_BROKER: "localhost"
          MQTT_BROKER_WSS: "localhost"
          MQTT_PUB_USERNAME: "test_user"
          MQTT_PUB_PASSWORD: "test_password"
          RESEND_API_KEY: "re_dummy_key_for_ci_pipeline"

      - name: Pytest
        run: pytest -v --tb=short --strict-markers -x
        env:
          RESEND_API_KEY: "re_dummy_key_for_ci_pipeline"

  # ── Continuous Delivery ─────────────────────────────────────────────
  cd:
    name: "CD · Build & Push Image"
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

